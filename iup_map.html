<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peta IUP Minerba Indonesia</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: #111827;
      color: #e5e7eb;
    }

    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 48px;
      background: #0f172a;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1e3a5f;
    }

    #header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #f59e0b;
      white-space: nowrap;
    }

    #sw {
      position: relative;
      flex: 1;
      max-width: 420px;
    }

    #cs {
      width: 100%;
      padding: 7px 14px;
      font-size: 13px;
      background: #1e293b;
      border: 1.5px solid #334155;
      color: #e5e7eb;
      border-radius: 7px;
      outline: none;
    }

    #cs:focus {
      border-color: #f59e0b;
    }

    #cs::placeholder {
      color: #64748b;
    }

    #dd {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .5);
      z-index: 3000;
      max-height: 260px;
      overflow-y: auto;
    }

    #dd.show {
      display: block;
    }

    .di {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      cursor: pointer;
      border-bottom: 1px solid #263344;
      font-size: 13px;
    }

    .di:last-child {
      border-bottom: none;
    }

    .di:hover {
      background: #2d3f55;
    }

    .dn {
      color: #e2e8f0;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dn em {
      color: #f59e0b;
      font-style: normal;
      font-weight: 700;
    }

    .dc {
      background: #1e3a2f;
      color: #34d399;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
      flex-shrink: 0;
    }

    .de {
      padding: 10px 14px;
      font-size: 13px;
      color: #64748b;
    }

    #rb {
      padding: 5px 12px;
      font-size: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      border-radius: 5px;
      cursor: pointer;
      white-space: nowrap;
      display: none;
    }

    #rb:hover {
      background: #334155;
      color: #e2e8f0;
    }

    #rb.show {
      display: block;
    }

    #cnt {
      font-size: 12px;
      color: #64748b;
      white-space: nowrap;
      margin-left: auto;
    }

    #map {
      position: fixed;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #sb {
      position: fixed;
      top: 48px;
      right: 0;
      bottom: 0;
      width: 360px;
      background: #0f172a;
      transform: translateX(100%);
      transition: transform .25s ease;
      z-index: 900;
      border-left: 1px solid #1e3a5f;
      display: flex;
      flex-direction: column;
    }

    #sb.open {
      transform: translateX(0);
    }

    #sbh {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #1e3a5f;
      background: #0f172a;
      flex-shrink: 0;
      position: relative;
    }

    #sbn {
      font-size: 14px;
      font-weight: 700;
      color: #f59e0b;
      line-height: 1.4;
      padding-right: 28px;
    }

    #sbm {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      background: #1e293b;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      color: #94a3b8;
    }

    .xbtn {
      position: absolute;
      top: 13px;
      right: 13px;
      background: none;
      border: none;
      color: #64748b;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
    }

    .xbtn:hover {
      color: #e5e7eb;
    }

    #sbb {
      flex: 1;
      overflow-y: auto;
    }

    .slabel {
      padding: 10px 14px 5px;
      font-size: 10px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .icard {
      margin: 0 10px 6px;
      padding: 11px 12px;
      background: #1e293b;
      border-radius: 8px;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .icard:hover {
      border-color: #f59e0b;
      background: #243044;
    }

    .icard.act {
      border-color: #f59e0b;
      background: #2a3a50;
    }

    .icrow {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .icname {
      font-size: 12px;
      font-weight: 600;
      color: #e2e8f0;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .zbtn {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: #0f172a;
      border: 1px solid #334155;
      color: #94a3b8;
      border-radius: 4px;
      font-size: 10px;
      padding: 3px 7px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .zbtn:hover {
      background: #1e293b;
      color: #e2e8f0;
    }

    .tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 500;
    }

    .tk {
      background: #14532d;
      color: #4ade80;
    }

    .ti {
      background: #1e3a5f;
      color: #7dd3fc;
    }

    .tp {
      background: #3b1f5e;
      color: #c084fc;
    }

    .tl {
      background: #431407;
      color: #fb923c;
    }

    .tc {
      background: #134e4a;
      color: #2dd4bf;
    }

    #dp {
      display: none;
      padding: 12px 14px;
    }

    #dp.show {
      display: block;
    }

    .bk {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #60a5fa;
      cursor: pointer;
      margin-bottom: 14px;
      padding: 4px 0;
    }

    .bk:hover {
      color: #93c5fd;
    }

    .zfull {
      width: 100%;
      padding: 7px;
      background: #1e3a5f;
      color: #7dd3fc;
      border: 1px solid #334155;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-bottom: 14px;
    }

    .zfull:hover {
      background: #263344;
    }

    .dr {
      display: flex;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid #1e293b;
      font-size: 12px;
    }

    .dl {
      color: #64748b;
      min-width: 130px;
      flex-shrink: 0;
    }

    .dv {
      color: #e2e8f0;
      word-break: break-word;
    }

    #filters {
      position: fixed;
      top: 55px;
      left: 10px;
      z-index: 800;
      background: rgba(15, 23, 42, .97);
      border: 1px solid #1e3a5f;
      border-radius: 9px;
      padding: 10px 12px;
      min-width: 195px;
    }

    #filters h3 {
      color: #f59e0b;
      margin-bottom: 7px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    select {
      width: 100%;
      padding: 5px 8px;
      margin-bottom: 5px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e5e7eb;
      border-radius: 5px;
      font-size: 12px;
      outline: none;
    }

    select:focus {
      border-color: #f59e0b;
    }

    .abtn {
      width: 100%;
      padding: 6px;
      background: #f59e0b;
      color: #0f172a;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
    }

    .abtn:hover {
      background: #fbbf24;
    }

    #legend {
      position: fixed;
      bottom: 16px;
      left: 10px;
      z-index: 800;
      background: rgba(15, 23, 42, .97);
      border: 1px solid #1e3a5f;
      border-radius: 9px;
      padding: 10px 12px;
      font-size: 11px;
    }

    #legend h3 {
      font-size: 10px;
      color: #f59e0b;
      margin-bottom: 7px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
    }

    .lr {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }

    .ld {
      width: 11px;
      height: 11px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, .96);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    #loading p {
      color: #60a5fa;
      font-size: 14px;
    }

    .spin {
      width: 36px;
      height: 36px;
      border: 3px solid #1e3a5f;
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: sp .75s linear infinite;
    }

    @keyframes sp {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="loading">
    <div class="spin"></div>
    <p id="lmsg">Memuat peta...</p>
  </div>
  <div id="header">
    <h1>&#128506; Peta IUP Minerba</h1>
    <div id="sw">
      <input id="cs" type="text" placeholder="Cari nama perusahaan..." autocomplete="off" spellcheck="false" />
      <div id="dd"></div>
    </div>
    <button id="rb" onclick="resetAll()">&#10005; Reset</button>
    <span id="cnt"></span>
  </div>
  <div id="filters">
    <h3>Filter</h3>
    <select id="fk">
      <option value="">Semua Komoditas</option>
    </select>
    <select id="fp">
      <option value="">Semua Provinsi</option>
    </select>
    <select id="fi">
      <option value="">Semua Jenis Izin</option>
    </select>
    <button class="abtn" onclick="applyFilters()">Terapkan</button>
  </div>
  <div id="map"></div>
  <div id="legend">
    <h3>Legenda</h3>
    <div id="lb"></div>
  </div>
  <div id="sb">
    <div id="sbh">
      <div id="sbn">Detail IUP</div>
      <div id="sbm"></div>
      <button class="xbtn" onclick="closeSB()">&#10005;</button>
    </div>
    <div id="sbb">
      <div id="cp"></div>
      <div id="dp"></div>
    </div>
  </div>

    var KC = { BATUBARA: '#f97316', TIMAH: '#38bdf8', NIKEL: '#22c55e', EMAS: '#eab308', TEMBAGA: '#fb923c', BAUKSIT: '#ec4899', 'BIJIH BESI': '#a855f7', MANGAN: '#67e8f9', CHROMIT: '#818cf8', PASIR: '#a3e635', ANDESIT: '#f472b6', 'BATU GAMPING': '#fb7185', SIRTU: '#34d399', DEFAULT: '#6b7280' };

    async function loadAll() {
      setMsg('Memuat geometri peta...');
      var geo;
      try {
        var r = await fetch('./iup_geometry.geojson');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        geo = await r.json();
      } catch (e) {
        setMsg('ERROR: ' + e.message);
        setTimeout(hideLoading, 3000);
        return;
      }
      allF = geo.features || [];

      // Build company index from GeoJSON properties directly
      compIdx = {};
      allF.forEach(function (f) {
        var p = f.properties || {};
        var name = gp(p, 'nama_usaha');
        var wiup = gp(p, 'kode_wiup');
        if (name && wiup) {
          if (!compIdx[name]) compIdx[name] = [];
          compIdx[name].push(wiup);
        }
      });

      console.log('Loaded ' + allF.length + ' features, ' + Object.keys(compIdx).length + ' companies');
      document.getElementById('cnt').textContent = allF.length.toLocaleString() + ' IUP';
      populateFilters(); buildLegend(); renderLayer(allF, []); setupSearch(); hideLoading();
    }

    // Feature lookup by wiup
    var featByWiup = {};
    function buildFeatIdx() {
      featByWiup = {};
      allF.forEach(function (f) {
        var w = gp(f.properties || {}, 'kode_wiup');
        if (w) featByWiup[w] = f.properties;
      });
    }

    function renderLayer(feats, hiWiups) {
      if (gL) map.removeLayer(gL);
      LBW = {}; featByWiup = {};
      var hiSet = {};
      hiWiups.forEach(function (w) { hiSet[w] = true; });
      var hasHi = hiWiups.length > 0;
      gL = L.geoJSON({ type: 'FeatureCollection', features: feats }, {
        style: function (f) {
          var p = f.properties || {};
          var w = gp(p, 'kode_wiup');
          var k = gp(p, 'komoditas'), col = gc(k);
          if (hasHi) {
            if (hiSet[w]) return { color: '#f59e0b', weight: 2.5, fillColor: col, fillOpacity: .92 };
            return { color: '#1e293b', weight: .3, fillColor: col, fillOpacity: .12 };
          }
          return { color: '#0f172a', weight: .4, fillColor: col, fillOpacity: .68 };
        },
        onEachFeature: function (f, layer) {
          var p = f.properties || {};
          var w = gp(p, 'kode_wiup');
          if (w) { LBW[w] = layer; featByWiup[w] = p; }
          var nama = gp(p, 'nama_usaha');
          var kom = gp(p, 'komoditas');
          var prov = gp(p, 'nama_prov');
          layer.on('mouseover', function (e) {
            if (!hiSet[w]) e.target.setStyle({ fillOpacity: .88, weight: 1.5, color: '#94a3b8' });
            layer.bindTooltip(
              '<b style="color:#f59e0b">' + (nama || 'IUP') + '</b><br>' +
              '<span style="color:#94a3b8">' + kom + (prov ? ' &middot; ' + prov : '') + '</span>',
              { sticky: true }
            ).openTooltip();
          });
          layer.on('mouseout', function (e) {
            gL.resetStyle(e.target);
            if (hiSet[w]) e.target.setStyle({ color: '#f59e0b', weight: 2.5, fillOpacity: .92 });
          });
          layer.on('click', function () {
            if (nama) showCompany(nama, w);
            else if (w) showDetail(w, null);
          });
        }
      }).addTo(map);
    }

    function zoomTo(wiup) {
      var layer = LBW[wiup];
      if (!layer) { console.warn('No layer for wiup:', wiup); return; }
      try {
        var b = layer.getBounds ? layer.getBounds() : null;
        if (b) map.fitBounds(b, { padding: [80, 80], maxZoom: 13 });
        layer.setStyle({ fillOpacity: 1, color: '#ffffff', weight: 3 });
        setTimeout(function () { layer.setStyle({ fillOpacity: .92, color: '#f59e0b', weight: 2.5 }); }, 700);
      } catch (e) { console.error(e); }
    }

    function showCompany(name, clickedW) {
      aC = name; aW = clickedW;
      var wiups = compIdx[name] || (clickedW ? [clickedW] : []);
      renderLayer(currentFiltered(), wiups);
      fitToWiups(wiups);
      document.getElementById('sbn').textContent = name;

      // Count komoditas from GeoJSON props
      var koms = {};
      wiups.forEach(function (w) {
        var p = featByWiup[w];
        if (p) { var k = gp(p, 'komoditas'); if (k) koms[k] = (koms[k] || 0) + 1; }
      });
      var ks = Object.keys(koms);
      document.getElementById('sbm').innerHTML =

        ks.slice(0, 3).map(function (k) { return '<span class="pill">' + k + '</span>'; }).join('');

      var html = '<div class="slabel">Semua Wilayah IUP (' + wiups.length + ')</div>';

        var p = featByWiup[w];
        if (!p) return;
        var isA = w === clickedW;
        var lokasi = gp(p, 'lokasi') || gp(p, 'nama_kab') || w;
        var luas = p.luas_sk ? parseFloat(p.luas_sk).toLocaleString('id-ID') + ' Ha' : '';

        html += '<div class="icrow">';
        html += '<div class="icname" title="' + lokasi + '">' + lokasi + '</div>';
        html += '<button class="zbtn" data-zoom="' + w + '">&#128269; Zoom</button>';
        html += '</div>';
        html += '<div class="tags">';
        if (kom) html += '<span class="tag tk">' + kom + '</span>';
        if (izin) html += '<span class="tag ti">' + izin + '</span>';

      var cpEl = document.getElementById('cp');

    function setupSearch() {
      var inp = document.getElementById('cs'), dd = document.getElementById('dd');

        var q = this.value.trim();
        if (q.length < 1) { dd.className = ''; dd.innerHTML = ''; return; }
        var qu = q.toUpperCase(), hits = [];
        for (var i = 0; i < CL.length; i++) {
          if (CL[i][0].toUpperCase().includes(qu)) { hits.push(CL[i]); if (hits.length >= 20) break; }
        }
        if (!hits.length) { dd.innerHTML = '<div class="de">Tidak ada hasil untuk "' + q + '"</div>'; dd.classList.add('show'); return; }
        dd.innerHTML = hits.map(function (h) {
          var n = h[0], c = h[1];
          var idx = n.toUpperCase().indexOf(qu);
          var hl = n.slice(0, idx) + '<em>' + n.slice(idx, idx + q.length) + '</em>' + n.slice(idx + q.length);
          return '<div class="di" data-pick="' + n.replace(/"/g, '&quot;') + '"><span class="dn">' + hl + '</span><span class="dc">' + c + ' IUP</span></div>';
        }).join('');
        dd.classList.add('show');
      });
      dd.addEventListener('click', function (e) {
        var item = e.target.closest('[data-pick]');
        if (item) { pick(item.dataset.pick); }

      inp.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { dd.classList.remove('show'); this.blur(); }

    function populateFilters() {

        var k = gp(p, 'komoditas'), v = gp(p, 'nama_prov'), i = gp(p, 'jenis_izin');

      fSel('fk', Object.keys(ks).sort(), 'Semua Komoditas');

      document.getElementById('lb').innerHTML =
        show.map(function (k) { return '<div class="lr"><div class="ld" style="background:' + KC[k] + '"></div><span>' + k + '</span></div>'; }).join('') +
        '<div class="lr"><div class="ld" style="background:' + KC.DEFAULT + '"></div><span>LAINNYA</span></div>';
    }
    function openSB() { document.getElementById('sb').classList.add('open'); document.getElementById('map').style.right = '360px'; map.invalidateSize(); }
    function closeSB() { document.getElementById('sb').classList.remove('open'); document.getElementById('map').style.right = '0'; map.invalidateSize(); }
    function resetAll() {
      aC = null; aW = null;
      document.getElementById('cs').value = '';
      document.getElementById('dd').classList.remove('show');
      document.getElementById('rb').classList.remove('show');
      closeSB(); renderLayer(currentFiltered(), []);
    }
    function fitToWiups(wiups) {
      if (!gL || !wiups.length) return;
      var bounds = null;
      gL.eachLayer(function (layer) {
        var p = layer.feature && layer.feature.properties || {};
        var w = gp(p, 'kode_wiup');
        if (wiups.indexOf(w) >= 0) {
          try { var b = layer.getBounds ? layer.getBounds() : null; if (b) bounds = bounds ? bounds.extend(b) : b; } catch (e) { }
        }
      });
      if (bounds) map.fitBounds(bounds, { padding: [60, 60], maxZoom: 9 });
    }
    function setMsg(m) { document.getElementById('lmsg').textContent = m; }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }
    loadAll();
  </script>
</body>

</html>
