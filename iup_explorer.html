<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IUP Data Explorer – Minerba ESDM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f5f7; color: #222; }
    #header {
      background: #16213e; color: #fff; padding: 14px 24px;
      display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }
    #header h1 { font-size: 16px; font-weight: 600; color: #e2b96f; display: flex; align-items: center; gap: 8px; }
    #header a { font-size: 12px; color: #7ecbff; text-decoration: none; margin-left: auto; }
    #header a:hover { text-decoration: underline; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: #fff; border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08); }
    .stat-card .label { font-size: 12px; color: #666; margin-bottom: 4px; }
    .stat-card .value { font-size: 26px; font-weight: 600; color: #16213e; }
    
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .chart-box, .chart-box-full { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08); }
    .chart-box-full { margin-bottom: 20px; }
    .chart-box h3, .chart-box-full h3 { font-size: 13px; color: #666; margin-bottom: 12px; font-weight: 500; }
    
    .canvas-container { position: relative; width: 100%; height: 230px; }
    .canvas-container-full { position: relative; width: 100%; height: 160px; }

    .filter-bar { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08); margin-bottom: 16px; }
    .filter-bar h3 { font-size: 13px; color: #666; margin-bottom: 10px; font-weight: 500; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    select, input[type=text] { font-size: 13px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; color: #222; outline: none; }
    select:focus, input:focus { border-color: #378ADD; }
    input[type=text] { flex: 1; min-width: 180px; }
    .row-count { font-size: 12px; color: #888; white-space: nowrap; }
    button.btn { font-size: 12px; padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; color: #222; }
    button.btn:hover { background: #f0f0f0; }
    
    .table-wrap { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    thead th { text-align: left; padding: 8px 10px; font-size: 12px; font-weight: 600; color: #555; border-bottom: 2px solid #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    tbody tr:hover { background: #f7f9fc; }
    tbody td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 0; color: #333; }
    .pagination { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
    .page-info { font-size: 12px; color: #888; }
    .no-data { text-align: center; padding: 40px; color: #888; }
    @media (max-width:640px) { .chart-grid { grid-template-columns: 1fr; } }
  </style>
</head>

<body>

  <div id="header">
    <h1>
      📊 IUP Data Explorer 
      <span style="background:#D85A30;color:#fff;font-size:10px;padding:3px 6px;border-radius:4px;font-weight:bold;">+ FILTER LUAS</span>
    </h1>
    <a href="iup_map.html">🗺 Open Map View →</a>
  </div>

  <div class="wrap">
    <div class="stat-grid" id="stat-cards">
      <div class="stat-card">
        <div class="label">Status</div>
        <div class="value" id="load-status" style="font-size:14px;color:#888;">Loading CSV…</div>
      </div>
    </div>
    
    <div class="chart-grid">
      <div class="chart-box">
        <h3>Records by commodity</h3>
        <div class="canvas-container"><canvas id="chart-komoditas"></canvas></div>
      </div>
      <div class="chart-box">
        <h3>Records by permit type</h3>
        <div class="canvas-container"><canvas id="chart-izin"></canvas></div>
      </div>
    </div>
    <div class="chart-box-full">
      <h3>Top 10 provinces by permit count</h3>
      <div class="canvas-container-full"><canvas id="chart-provinsi"></canvas></div>
    </div>

    <div class="filter-bar">
      <h3>Filter &amp; Search</h3>
      <div class="filters">
        <select id="f-komoditas"></select>
        <select id="f-provinsi"></select>
        <select id="f-izin"></select>
        <select id="f-sort" style="font-weight: 600; color: #D85A30;">
          <option value="">Urutan Default</option>
          <option value="asc">Luas: Terkecil - Terbesar</option>
          <option value="desc">Luas: Terbesar - Terkecil</option>
        </select>
        <input type="text" id="f-search" placeholder="Search company name…" />
        <span class="row-count" id="row-count"></span>
      </div>
    </div>
    
    <div class="table-wrap">
      <table>
        <thead id="tbl-head"></thead>
        <tbody id="tbl-body"></tbody>
      </table>
      <div class="pagination">
        <button class="btn" onclick="prevPage()">← Prev</button>
        <span class="page-info" id="page-info"></span>
        <button class="btn" onclick="nextPage()">Next →</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script>
    const CSV_FILE = 'iup_metadata.csv';
    const PAGE_SIZE = 25;
    const FIELD_MAP = {
      company: ['nama_usaha', 'NAMA_PERUSAHAAN', 'NamaPerusahaan', 'Nama Perusahaan'],
      komoditas: ['komoditas', 'KOMODITAS', 'Komoditas'],
      izin: ['jenis_izin', 'JENIS_IZIN', 'JenisIzin', 'Jenis Izin'],
      provinsi: ['nama_prov', 'NAMA_PROVINSI', 'NamaProvinsi', 'Provinsi'],
      kabupaten: ['nama_kab', 'NAMA_KABUPATEN', 'NamaKabupaten', 'Kabupaten'],
      lokasi: ['lokasi', 'LOKASI_TAMBANG', 'LokasiTambang', 'Lokasi Tambang'],
      luas: ['luas_sk', 'LUAS_WILAYAH', 'LuasWilayah', 'Luas (Ha)'],
      status: ['cnc', 'STATUS_CNC', 'StatusCNC', 'Status CNC'],
      sk: ['sk_iup', 'NOMOR_SK', 'NomorSK', 'Nomor SK'],
    };
    const CHART_COLORS = ['#378ADD', '#1D9E75', '#D85A30', '#BA7517', '#D4537E', '#7F77DD', '#639922', '#E24B4A', '#888780', '#0F6E56'];

    let allRows = [], filtered = [], page = 0, fieldIndex = {}, charts = {};

    function detectFields(firstRow) {
      const keys = Object.keys(firstRow);
      for (const [alias, candidates] of Object.entries(FIELD_MAP)) {
        for (const c of candidates) { if (keys.includes(c)) { fieldIndex[alias] = c; break; } }
      }
    }
    function f(alias) { return fieldIndex[alias] || null; }
    function val(row, alias) { 
      let v = f(alias) ? (row[f(alias)] || '') : ''; 
      if (typeof v === 'string') v = v.replace(/[\r\n\t]+/g, ' ').replace(/\s{2,}/g, ' ').trim();
      return v; 
    }
    function escapeHTML(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function buildStats(rows) {
      const totalArea = f('luas') ? rows.reduce((s, r) => s + (parseFloat(r[f('luas')]) || 0), 0) : null;
      const stats = [
        { label: 'Total records', value: rows.length.toLocaleString() },
        { label: 'Commodities', value: f('komoditas') ? new Set(rows.map(r => r[f('komoditas')])).size : '—' },
        { label: 'Provinces', value: f('provinsi') ? new Set(rows.map(r => r[f('provinsi')])).size : '—' },
        { label: 'Total area (Ha)', value: totalArea ? Math.round(totalArea).toLocaleString() : '—' },
      ];
      document.getElementById('stat-cards').innerHTML = stats.map(s => `
        <div class="stat-card"><div class="label">${s.label}</div><div class="value">${s.value}</div></div>`).join('');
    }
    function countBy(rows, field) {
      if (!field) return {};
      const m = {};
      rows.forEach(r => { const v = r[field] || 'Unknown'; m[v] = (m[v] || 0) + 1; });
      return m;
    }
    function topN(obj, n) { return Object.entries(obj).sort((a, b) => b[1] - a[1]).slice(0, n); }
    function makeChart(id, type, labels, data) {
      if (charts[id]) charts[id].destroy();
      charts[id] = new Chart(document.getElementById(id).getContext('2d'), {
        type, data: { labels, datasets: [{ data, backgroundColor: CHART_COLORS, borderWidth: 0 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: type === 'bar' ? 'none' : 'right', labels: { font: { size: 11 }, boxWidth: 12, padding: 8 } } },
          scales: type === 'bar' ? { x: { ticks: { font: { size: 11 }, maxRotation: 30 }, grid: { display: false } }, y: { ticks: { font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.05)' } } } : {}
        }
      });
    }
    function buildCharts(rows) {
      const kd = topN(countBy(rows, f('komoditas')), 8), id = topN(countBy(rows, f('izin')), 8), pd = topN(countBy(rows, f('provinsi')), 10);
      if (kd.length) makeChart('chart-komoditas', 'doughnut', kd.map(x => x[0]), kd.map(x => x[1]));
      if (id.length) makeChart('chart-izin', 'doughnut', id.map(x => x[0]), id.map(x => x[1]));
      if (pd.length) makeChart('chart-provinsi', 'bar', pd.map(x => x[0]), pd.map(x => x[1]));
    }
    function fillSelect(elId, alias, placeholder) {
      const el = document.getElementById(elId), field = f(alias);
      if (!field) { el.style.display = 'none'; return; }
      const vals = [...new Set(allRows.map(r => r[field]).filter(Boolean))].sort();
      el.innerHTML = `<option value="">All ${placeholder}</option>` + vals.map(v => `<option>${escapeHTML(v)}</option>`).join('');
      el.onchange = applyFilters;
    }
    
    // --- LOGIKA FILTER DAN URUTAN (SORTING) ---
    function applyFilters() {
      const kv = document.getElementById('f-komoditas').value;
      const pv = document.getElementById('f-provinsi').value;
      const iv = document.getElementById('f-izin').value;
      const sv = document.getElementById('f-search').value.toLowerCase();
      const sortVal = document.getElementById('f-sort').value; // Mengambil nilai urutan
      
      // 1. Saring Data Terlebih Dahulu
      filtered = allRows.filter(r => {
        if (kv && val(r, 'komoditas') !== kv) return false;
        if (pv && val(r, 'provinsi') !== pv) return false;
        if (iv && val(r, 'izin') !== iv) return false;
        if (sv && !Object.values(r).join(' ').toLowerCase().includes(sv)) return false;
        return true;
      });

      // 2. Urutkan Data Berdasarkan Luas
      if (sortVal === 'asc') {
        filtered.sort((a, b) => (parseFloat(val(a, 'luas')) || 0) - (parseFloat(val(b, 'luas')) || 0));
      } else if (sortVal === 'desc') {
        filtered.sort((a, b) => (parseFloat(val(b, 'luas')) || 0) - (parseFloat(val(a, 'luas')) || 0));
      }

      page = 0; renderPage();
    }

    const TABLE_COLS = [
      { alias: 'company', label: 'Nama Perusahaan', width: '22%' }, { alias: 'komoditas', label: 'Komoditas', width: '11%' },
      { alias: 'izin', label: 'Jenis Izin', width: '10%' }, { alias: 'provinsi', label: 'Provinsi', width: '14%' },
      { alias: 'kabupaten', label: 'Kabupaten', width: '14%' }, { alias: 'luas', label: 'Luas (Ha)', width: '10%' },
      { alias: 'status', label: 'Status CNC', width: '9%' },
    ];
    let activeCols = [];
    function buildTableHeader() {
      activeCols = TABLE_COLS.filter(c => f(c.alias));
      document.getElementById('tbl-head').innerHTML = `<tr>${activeCols.map(c => `<th style="width:${c.width}">${c.label}</th>`).join('')}</tr>`;
    }
    function renderPage() {
      const start = page * PAGE_SIZE, slice = filtered.slice(start, start + PAGE_SIZE);
      document.getElementById('tbl-body').innerHTML = slice.map(r => `<tr>${activeCols.map(c => {
          const safeData = escapeHTML(val(r, c.alias)); return `<td title="${safeData}">${safeData || '—'}</td>`;
        }).join('')}</tr>`).join('');
      document.getElementById('page-info').textContent = `Page ${page + 1} of ${Math.max(1, Math.ceil(filtered.length / PAGE_SIZE))} — ${filtered.length.toLocaleString()} records`;
      document.getElementById('row-count').textContent = `${filtered.length.toLocaleString()} results`;
    }
    function prevPage() { if (page > 0) { page--; renderPage(); } }
    function nextPage() { if ((page + 1) * PAGE_SIZE < filtered.length) { page++; renderPage(); } }

    async function loadCSV() {
      let text;
      try {
        const res = await fetch(CSV_FILE);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        text = await res.text();
      } catch (e) {
        document.getElementById('stat-cards').innerHTML = `<div class="stat-card no-data" style="grid-column:1/-1"><h2>CSV file not found</h2><p>Error: ${e.message}</p></div>`;
        return;
      }

      text = text.replace(/\r\n/g, '\n');
      text = text.replace(/;+\s*$/gm, '');
      let lines = text.split('\n');
      let cleanLines = [];
      
      for(let i=0; i < lines.length; i++) {
        let t = lines[i].trim();
        if(!t) continue;
        if (t.startsWith('"') && t.endsWith('"') && t.length > 1) {
          t = t.substring(1, t.length - 1).replace(/""/g, '"');
        }
        t = t.replace(/"([^"]*)"/g, function(match, innerText) {
          return innerText.replace(/,/g, ' - '); 
        });
        t = t.replace(/"/g, '');
        cleanLines.push(t);
      }
      
      text = cleanLines.join('\n');

      const result = Papa.parse(text, { header: true, skipEmptyLines: true, dynamicTyping: false, delimiter: "," });
      allRows = result.data;
      detectFields(allRows[0] || {});

      allRows = allRows.filter(r => { const comp = val(r, 'company'); return comp && comp !== '' && comp !== '—'; });
      filtered = [...allRows];
      
      buildStats(allRows); buildCharts(allRows);
      fillSelect('f-komoditas', 'komoditas', 'commodities'); fillSelect('f-provinsi', 'provinsi', 'provinces'); fillSelect('f-izin', 'izin', 'permit types');
      buildTableHeader(); 
      
      // Tambahkan pendeteksi perubahan pada fungsi filter & dropdown sort
      document.getElementById('f-search').addEventListener('input', applyFilters); 
      document.getElementById('f-sort').addEventListener('change', applyFilters); 
      
      renderPage();
    }
    loadCSV();
  </script>
</body>
</html>
